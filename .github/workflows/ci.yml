name: CI

on:
  push:
    branches: [main, 't0/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: verify-dist gate (byte-compare vs canonical dist)
        run: bash scripts/verify-dist.sh
      - name: Build
        run: npm run build
      - name: Unit tests (vitest)
        run: npm test
      - name: Smoke test (stdio, 41 tools)
        run: node scripts/smoke-test.mjs
      - name: Team E2E (owner scoping, markdown backend, 18 checks)
        run: node scripts/team-e2e.mjs
      - name: Team E2E (owner scoping, supabase backend — skips without secrets)
        env:
          SB_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SB_SUPABASE_KEY: ${{ secrets.E2E_SUPABASE_KEY }}
        run: node scripts/team-e2e-supabase.mjs

  office-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - name: Install markitdown
        run: pip install 'markitdown[all]'
      - name: Build
        run: npm run build
      - name: Office ingest E2E (real markitdown — AC1/AC6/AC9)
        run: node scripts/ingest-office-e2e.mjs
