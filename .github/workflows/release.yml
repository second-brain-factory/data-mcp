name: Release

# Publishes to npm when a v* tag is pushed.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# The trusted publisher is configured on npmjs.com for @iwo-szapar/data-mcp:
#   org: second-brain-factory, repo: data-mcp, workflow: release.yml

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Update npm (Trusted Publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: verify-dist gate
        run: bash scripts/verify-dist.sh
      - name: Build
        run: npm run build
      - name: Unit tests (vitest)
        run: npm test
      - name: Smoke test
        run: node scripts/smoke-test.mjs
      - name: Team E2E
        run: node scripts/team-e2e.mjs
      - name: Team E2E (supabase — skips without secrets)
        env:
          SB_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SB_SUPABASE_KEY: ${{ secrets.E2E_SUPABASE_KEY }}
        run: node scripts/team-e2e-supabase.mjs
      - name: Assert tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - name: Publish (OIDC)
        run: npm publish
